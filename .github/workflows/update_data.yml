name: Aggiornamento BTP Quotidiano

on:
  schedule:
    - cron: '0 18 * * 1-5' 
  workflow_dispatch: 

jobs:
  aggiorna-dati:
    runs-on: ubuntu-latest 

    # 🌟 MAGIA 1: Questa riga FORZA i permessi di scrittura per il salvataggio!
    permissions:
      contents: write

    steps:
    - name: 1. Scarica i file del nostro progetto
      uses: actions/checkout@v4

    - name: 2. Prepara Python sul server
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Installa le librerie necessarie
      run: |
        python -m pip install --upgrade pip
        pip install pandas selenium webdriver-manager html5lib lxml

    - name: 4. Lancia il nostro script magico
      run: python scraper_btp.py

    - name: 5. Salva i nuovi dati e caricali sul sito
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 🌟 MAGIA 2: Controlla se il file esiste prima di aggiungerlo, evitando l'errore 128!
        if [ -f "dati_btp_completi.csv" ]; then
          git add dati_btp_completi.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento automatico dati BTP" && git push)
          echo "✅ Salvataggio completato con successo!"
        else
          echo "⚠️ ATTENZIONE: Il file CSV non è stato creato. Lo script Python è stato bloccato."
        fi
